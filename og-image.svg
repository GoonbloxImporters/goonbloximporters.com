<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#12121C"/>
    </linearGradient>
    <linearGradient id="grad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF2D78"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06D6A0"/>
    </linearGradient>
    <linearGradient id="grad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06D6A0"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#8B5CF6" stroke-width="1"/>
  </g>

  <!-- Floating blocks (decorative) -->
  <rect x="80" y="80" width="40" height="40" rx="6" fill="url(#grad1)" opacity="0.15" transform="rotate(15 100 100)"/>
  <rect x="1050" y="120" width="30" height="30" rx="5" fill="url(#grad2)" opacity="0.12" transform="rotate(-20 1065 135)"/>
  <rect x="950" y="450" width="50" height="50" rx="8" fill="url(#grad3)" opacity="0.1" transform="rotate(30 975 475)"/>
  <rect x="150" y="480" width="35" height="35" rx="5" fill="#FFB627" opacity="0.1" transform="rotate(-10 167 497)"/>
  <rect x="1100" y="350" width="25" height="25" rx="4" fill="#FF6B6B" opacity="0.08" transform="rotate(45 1112 362)"/>
  <rect x="50" y="300" width="28" height="28" rx="4" fill="url(#grad2)" opacity="0.08" transform="rotate(25 64 314)"/>

  <!-- Glow behind logo -->
  <circle cx="600" cy="220" r="120" fill="#FF2D78" opacity="0.04"/>
  <circle cx="600" cy="220" r="80" fill="#8B5CF6" opacity="0.06"/>

  <!-- G Monogram -->
  <g transform="translate(555, 140)">
    <rect width="90" height="90" rx="20" fill="url(#grad1)"/>
    <path d="M56 34H38C35.2 34 33 36.2 33 39V49C33 51.8 35.2 54 38 54H52V47H41V41H56V34Z" fill="white"/>
    <rect x="49" y="44" width="10" height="10" rx="2" fill="white"/>
  </g>

  <!-- Studio Name -->
  <text x="600" y="290" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="62" font-weight="900" letter-spacing="2" fill="url(#grad1)">GOONBLOX</text>
  <text x="600" y="340" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="600" letter-spacing="12" fill="#A1A1B5">IMPORTERS</text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="600" letter-spacing="6" fill="#06D6A0">WE BUILD WORLDS</text>

  <!-- Separator line -->
  <rect x="460" y="430" width="280" height="2" rx="1" fill="url(#grad1)" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="600" y="470" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6B7280" letter-spacing="2">INDIE ROBLOX GAME STUDIO</text>

  <!-- Game tags -->
  <g transform="translate(600, 510)">
    <rect x="-250" y="0" width="110" height="30" rx="15" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="-195" y="20" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#A1A1B5">MERGEPETS</text>

    <rect x="-120" y="0" width="90" height="30" rx="15" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="-75" y="20" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#A1A1B5">22 PETS</text>

    <rect x="-10" y="0" width="90" height="30" rx="15" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="35" y="20" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#A1A1B5">4 ZONES</text>

    <rect x="100" y="0" width="110" height="30" rx="15" fill="#1E1E2E" stroke="#2A2A3E" stroke-width="1"/>
    <text x="155" y="20" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="700" letter-spacing="2" fill="#A1A1B5">FAIR PLAY</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="625" width="1200" height="5" fill="url(#grad1)"/>
</svg>
